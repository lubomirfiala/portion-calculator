services:
  app:
    container_name: portion-calculator
    build:
      context: .
      target: dev
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    volumes:
      - .:/app
    ports:
      - "80:8080"
    user: node
    command: sh -c "npm install && npm run dev"
